<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https: http:"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/webp" href="/lingxi-avatar-sm.webp" />
    <title>灵犀 · AI助手</title>
    <style>
      /* 内联启动屏：在 JS 加载前立即显示，消除白屏 */
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: #f5f5f7;
        transition: opacity 0.25s ease, visibility 0.25s ease;
      }

      #app-splash.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      #app-splash .splash-logo {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        background: linear-gradient(145deg, #3370ff 0%, #0057ff 100%);
        box-shadow: 0 8px 24px rgba(0, 87, 255, 0.22);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 28px;
        font-weight: 600;
        font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif;
        user-select: none;
      }

      #app-splash .splash-spinner {
        width: 28px;
        height: 28px;
        border: 3px solid #e5e6eb;
        border-top-color: #0057ff;
        border-radius: 50%;
        animation: splash-spin 0.75s linear infinite;
      }

      #app-splash .splash-text {
        font-size: 14px;
        color: #86909c;
        font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif;
      }

      @keyframes splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app-splash" role="status" aria-live="polite" aria-label="灵犀正在启动">
      <div class="splash-logo" aria-hidden="true">灵</div>
      <div class="splash-spinner" aria-hidden="true"></div>
      <span class="splash-text">灵犀正在启动…</span>
    </div>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
